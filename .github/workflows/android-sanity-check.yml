name: Android Sanity Check (CI)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  check-syntax:
    name: Lint & Compile Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./controller

    steps:
    - name: Checkout Project Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    # Phase 0 safety net: unit tests are a BLOCKING gate.
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --stacktrace

    # Lint runs for visibility. It is non-blocking for now (abortOnError=false in
    # app/build.gradle); flip that to true once the existing lint backlog is triaged.
    - name: Run Android Lint (reporting)
      run: ./gradlew lintDebug

    - name: Compile Test (Assemble Debug)
      run: ./gradlew assembleDebug --stacktrace
